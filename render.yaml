# Render.com Web Service Configuration
# Uses Express server for static files + Anthropic API proxy
# Set ANTHROPIC_API_KEY in Render Environment for AI features
services:
  - type: web
    name: python-mastery-course
    buildCommand: npm run build && npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
