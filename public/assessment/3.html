<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 3 Assessment | Python Mastery</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="top-nav">
    <a href="/">← Course</a>
    <a href="/week/3.html">Week 3</a>
  </nav>
  <main class="container">
    <h1>📝 Week 3 Assessment</h1>
    <p>Week 3 Assessment: Pandas</p>
    <form id="assessment-form">
      
        <div class="aq-question">
          <p><strong>1. What is a pandas Series?</strong></p>
          <div class="aq-options">
            
              <label><input type="radio" name="q1" value="0"> 1D array with labels</label><br>
              <label><input type="radio" name="q1" value="1"> 2D table</label><br>
              <label><input type="radio" name="q1" value="2"> Database row</label><br>
              <label><input type="radio" name="q1" value="3"> List</label>
          </div>
        </div>
        <div class="aq-question">
          <p><strong>2. Given df, how do you select column 'age'?</strong></p>
          <div class="aq-options">
            
              <label><input type="radio" name="q2" value="0"> df.age</label><br>
              <label><input type="radio" name="q2" value="1"> df['age']</label><br>
              <label><input type="radio" name="q2" value="2"> Both work</label><br>
              <label><input type="radio" name="q2" value="3"> df.column</label>
          </div>
        </div>
      <div class="aq-question">
        <p><strong>3. Group df by 'category' and get mean of 'value'.</strong></p>
        <textarea name="q3" rows="4" placeholder="Write your code or answer..."></textarea>
      </div>
        <div class="aq-question">
          <p><strong>4. merge() in pandas performs?</strong></p>
          <div class="aq-options">
            
              <label><input type="radio" name="q4" value="0"> Concatenation</label><br>
              <label><input type="radio" name="q4" value="1"> SQL-like join</label><br>
              <label><input type="radio" name="q4" value="2"> Append</label><br>
              <label><input type="radio" name="q4" value="3"> Replace</label>
          </div>
        </div>
      <div class="aq-question">
        <p><strong>5. Drop rows with NaN in column 'x'.</strong></p>
        <textarea name="q5" rows="4" placeholder="Write your code or answer..."></textarea>
      </div>
      <button type="submit">Submit for Grading</button>
    </form>
    <section id="results" class="hidden">
      <h2>Results</h2>
      <p id="score"></p>
      <p id="ai-analysis"></p>
      <button type="button" id="get-ai-analysis" class="ai-analysis-btn">Get AI Feedback (Claude)</button>
      <div id="ai-analysis-result" class="ai-analysis-result hidden"></div>
    </section>
    <script>
      var assessmentData = {"week":3,"questions":[{"id":1,"type":"mcq","q":"What is a pandas Series?","options":["1D array with labels","2D table","Database row","List"],"answer":0},{"id":2,"type":"mcq","q":"Given df, how do you select column 'age'?","options":["df.age","df['age']","Both work","df.column"],"answer":2},{"id":3,"type":"code","q":"Group df by 'category' and get mean of 'value'.","solution":"df.groupby('category')['value'].mean()"},{"id":4,"type":"mcq","q":"merge() in pandas performs?","options":["Concatenation","SQL-like join","Append","Replace"],"answer":1},{"id":5,"type":"code","q":"Drop rows with NaN in column 'x'.","solution":"df.dropna(subset=['x'])"}]};
      document.getElementById('assessment-form').onsubmit=function(e){
        e.preventDefault();
        var ans=[{"id":1,"type":"mcq","answer":0},{"id":2,"type":"mcq","answer":2},{"id":3,"type":"code","solution":"df.groupby('category')['value'].mean()"},{"id":4,"type":"mcq","answer":1},{"id":5,"type":"code","solution":"df.dropna(subset=['x'])"}];
        var correct=0;
        var answers={};
        ans.forEach(function(a,i){
          var el=document.querySelector('[name="q'+a.id+'"]');
          if(!el)return;
          var v=el.type==='radio'?(document.querySelector('[name="q'+a.id+']:checked')?parseInt(document.querySelector('[name="q'+a.id+']:checked').value):-1):el.value.trim();
          answers['q'+a.id]=v;
          if(a.type==='mcq'&&v===a.answer)correct++;
          if(a.type==='code'&&v&&v.length>0)correct++;
        });
        var total=ans.length;
        var pct=Math.round(correct/total*100);
        document.getElementById('score').textContent='Score: '+correct+'/'+total+' ('+pct+'%). Passing: '+(assessment.passingScore||70)+'%';
        document.getElementById('ai-analysis').innerHTML='<strong>Tip:</strong> Click "Get AI Feedback" for personalized analysis.';
        document.getElementById('results').classList.remove('hidden');
        window._lastAnswers = answers;
        window._lastScore = correct+'/'+total+' ('+pct+'%)';
      };
      document.getElementById('get-ai-analysis').onclick=function(){
        var btn=this;
        var out=document.getElementById('ai-analysis-result');
        if(!window._lastAnswers){ out.textContent='Submit the assessment first.'; out.classList.remove('hidden'); return; }
        btn.disabled=true;
        out.innerHTML='<em>Analyzing...</em>';
        out.classList.remove('hidden');
        fetch(window.location.origin+'/api/analyze-assessment',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            week:assessmentData.week,
            answers:window._lastAnswers,
            score:window._lastScore,
            questions:assessmentData.questions
          })
        })
        .then(function(r){ if(!r.ok) throw new Error('Request failed'); return r.json(); })
        .then(function(d){
          out.innerHTML='<div class="ai-feedback">'+d.analysis.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</div>';
        })
        .catch(function(e){ out.innerHTML='<p class="error">'+e.message+' (Is ANTHROPIC_API_KEY set?)</p>'; })
        .finally(function(){ btn.disabled=false; });
      };
    </script>
  </main>
</body>
</html>
